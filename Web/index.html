<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SGTH - Recepción</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h1 class="mb-4">Sistema de Gestión de Triaje Hospitalario </h1>
<h1 class="">Ever Misael Lopez Perez 1890-24-3260 Dennis Rodrigo Melgar Perez 1890-24-9352 </h1>

<ul class="nav nav-tabs">
    <li class="nav-item"><a class="nav-link active" href="#" id="tabPacientes">Ver Pacientes</a></li>
    <li class="nav-item"><a class="nav-link" href="#" id="tabRegistro">Nuevo Registro</a></li>
</ul>

<div id="pacientesPanel" class="mt-3">
    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th><th>Médico Responsable</th><th>Gravedad</th><th>Estado</th><th>Ingreso</th>
        </tr>
        </thead>
        <tbody id="pacientesTable"></tbody>
    </table>
</div>

<div id="registroPanel" class="mt-3" style="display:none;">
    <form id="registroForm">
        <div class="mb-3">
            <label>Médico Responsable</label>
            <input type="text" class="form-control" id="medicoResponsable" required>
        </div>
        <div class="mb-3">
            <label>Gravedad (1-5)</label>
            <input type="number" class="form-control" id="nivelGravedad" min="1" max="5" required>
        </div>
        <div class="mb-3">
            <label>Estado</label>
            <input type="text" class="form-control" id="estado" required>
        </div>
        <div class="mb-3">
            <label>Fecha Ingreso</label>
            <input type="datetime-local" class="form-control" id="fechaIngreso" required>
        </div>
        <button type="submit" class="btn btn-primary">Registrar</button>
    </form>
    <div id="mensajeError" class="text-danger mt-2"></div>
</div>

<script src="script.js"></script>
</body>
</html>
